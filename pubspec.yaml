name: dastur_parent_portal
description: "Dastur School Parent Portal - Cross-platform Flutter app for parents, teachers, and admins."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.1
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.0.1
  firebase_storage: ^12.0.1
  image_picker: ^1.0.4
  shared_preferences: ^2.5.4
  http: ^1.6.0
  flutter_local_notifications: ^17.1.2
  googleapis_auth: ^2.0.0
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - serviceAccountKey.json
